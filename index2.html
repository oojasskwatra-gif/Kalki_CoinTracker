<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Oojass Crypto Dashboard</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

<header>
  <h1> Oojass Crypto Dashboard</h1>
  <p class="tagline">Track live cryptocurrency prices easily</p>
</header>

<div class="controls">

  <select id="sort">
    <option value="">Sort by Price</option>
    <option value="high">High → Low</option>
    <option value="low">Low → High</option>
  </select>
</div>

<div id="container"></div>

<script src="script2.js"></script>
</body>
</html>
